[pytest]
# Pytest 配置

# 测试路径
testpaths = tests

# Python 文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步支持
asyncio_mode = auto

# 标记定义
markers =
    asyncio: 异步测试标记
    slow: 耗时测试
    integration: 集成测试
    unit: 单元测试

# 覆盖率配置
[coverage:run]
branch = True
source = src
omit =
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
