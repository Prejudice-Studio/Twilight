packages:
  - .

overrides:
  "picomatch@<2.3.2": "^2.3.2"
  "picomatch@>=4.0.0 <4.0.4": "^4.0.4"
  "lodash@<4.18.0": "^4.18.1"
  "postcss@<8.5.10": "^8.5.10"
  "brace-expansion@>=2.0.0 <2.0.3": "^2.0.3"
  "brace-expansion@<1.1.13": "^1.1.13"
  "ws@>=8.0.0 <8.20.1": "^8.20.1"
  "qs@>=6.11.1 <=6.15.1": "^6.15.2"
  "glob@>=10.2.0 <10.5.0": "^10.5.0"
  "minimatch@>=9.0.0 <9.0.7": "^9.0.7"
  "flatted@<3.4.2": "^3.4.2"

# pnpm 10+ 在 CI / 非交互环境默认阻断依赖 postinstall，必须显式批准。
# esbuild: Next / OpenNext 构建工具链；sharp: Next 图片相关可选原生依赖；
# unrs-resolver: ESLint/Next 解析器；workerd: Cloudflare/OpenNext 预览与部署。
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true
