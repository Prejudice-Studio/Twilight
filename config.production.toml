# ===================================================================
# Twilight 生产环境配置模板
# 复制此文件为 config.toml 并根据实际情况修改
# 优先级: 环境变量 > config.toml > 程序默认值
# 环境变量格式: TWILIGHT_{SECTION}_{KEY}，如 TWILIGHT_GLOBAL_SERVER_NAME
# ===================================================================

[Global]
# 服务器名称，显示在前端页面标题
server_name = "Twilight"
# 服务器图标 URL（可选，留空使用默认图标）
server_icon = ""
# 是否开启日志输出
logging = true
# 日志等级 (10=DEBUG, 20=INFO, 30=WARNING, 40=ERROR)
log_level = 20
# 是否打印 SQLAlchemy ORM 日志（调试时开启）
sqlalchemy_log = false
# HTTP 请求失败时最大重试次数
max_retry = 3
# 数据库文件存放目录（相对于项目根目录）
databases_dir = "db"

# Redis 连接地址（可选，用于缓存、分布式锁、Token 等）
# 留空则使用内存实现，程序重启后缓存失效
# 格式示例：redis://[:password@]host:port/db
redis_url = ""

# Bangumi 相关配置
# Bangumi 个人令牌（从 https://bgm.tv/dev/app 获取）
bangumi_token = ""
# 是否启用全局 Bangumi 同步功能
global_bgm_mode = false
# Bangumi API 地址
bangumi_api_url = "https://api.bgm.tv"
# Bangumi App ID（可选）
bangumi_app_id = ""

# Telegram 相关配置
# 是否启用 Telegram Bot 模式
telegram_mode = false
# 是否强制绑定 Telegram（开启后注册时必须提供 telegram_id）
force_bind_telegram = false

# 邮箱绑定相关配置
# 是否启用邮箱绑定功能
email_bind = false
# 是否强制绑定邮箱
force_bind_email = false

# TMDB 相关配置
# TMDB API Key v3（从 https://www.themoviedb.org/settings/api 获取）
tmdb_api_key = ""
# TMDB API 地址（可替换国内镜像）
tmdb_api_url = "https://api.themoviedb.org/3"
# TMDB 图片 CDN 地址
tmdb_image_url = "https://image.tmdb.org/t/p"

# ===================================================================
[Emby]
# ===================================================================
# Emby/Jellyfin 服务器地址（后端用于连接）
# Docker 部署时请按实际网络环境配置地址
emby_url = "http://127.0.0.1:8096/"
# Emby API Token（管理面板 → 高级 → API 密钥）
emby_token = ""
# 管理员用户名（API Token 不可用时备用）
emby_username = ""
# 管理员密码（API Token 不可用时备用）
emby_password = ""
# 前端展示的 Emby 访问线路列表，格式为 "名称 : 地址"
emby_url_list = [
  "直连 : http://your-server:8096/",
]
# 白名单用户专用线路列表
emby_url_list_for_whitelist = [
  "直连 : http://your-server:8096/",
]
# NSFW 媒体库名称列表，匹配 Emby 中的媒体库名
emby_nsfw = []

# ===================================================================
[Telegram]
# ===================================================================
# Telegram Bot API 基础地址
telegram_api_url = "https://api.telegram.org/bot"
# Bot Token
bot_token = ""
# 管理员 Telegram ID 列表
admin_id = []
# 群组 ID 或 @用户名 列表
group_id = []
# 频道 ID 或 @用户名 列表
channel_id = []
# 是否要求用户加入群组/频道后才能使用系统
force_subscribe = false
# 是否启用 TG Bot 面板功能
enable_tg_panel = false
# Telegram 代理地址（可选）
proxy_url = ""

# ===================================================================
[SAR]
# ===================================================================
# 积分名称，会在前端和通知中显示
score_name = "暮光币"
# 是否允许注册
register_mode = true
# 是否仅允许使用注册码注册
register_code_limit = false
# 是否允许使用积分注册/激活
score_register_mode = false
# 积分注册/激活所需积分
score_register_need = 100
# 最大注册用户数量，-1 表示不限制
user_limit = 200
# 新用户注册或续期时是否通知管理员
new_user_notice_status = false
# 通知是否包含个人主页链接
new_user_notice_link = false

# ---- 无码注册（待激活） ----
# 是否允许无码注册
allow_pending_register = true
# 无码注册赠送初始积分
pending_register_bonus = 0
# 是否允许无 Emby 账户用户签到
allow_no_emby_checkin = true
# 是否允许无 Emby 账户用户查看部分内容
allow_no_emby_view = true

# ---- 管理员 / 白名单 ----
admin_uids = "1"
admin_usernames = ""
white_list_uids = ""
white_list_usernames = ""

# ---- 红包功能 ----
red_packet_mode = false
red_packet_min_amount = 1
red_packet_max_amount = 10000
red_packet_min_count = 1
red_packet_max_count = 100
red_packet_expire_hours = 24

# ---- 转账功能 ----
private_transfer_mode = false
transfer_min_amount = 1
transfer_max_amount = 10000
transfer_daily_limit = 50000
transfer_fee_rate = 0.0

# ---- 签到配置 ----
checkin_base_score = 10
checkin_streak_bonus = 2
checkin_max_streak_bonus = 20
checkin_random_min = 0
checkin_random_max = 5

# ---- 自动续期 ----
auto_renew_enabled = false
auto_renew_days = 30
auto_renew_cost = 100
auto_renew_before_days = 3
auto_renew_notify = true

# ---- 邀请系统 ----
invite_enabled = false
invite_reward = 50
invite_limit = 10

# ---- 无 Emby 账户用户清理 ----
auto_cleanup_no_emby = false
auto_cleanup_no_emby_days = 7

# ===================================================================
[DeviceLimit]
# ===================================================================
# 是否启用设备限制
device_limit_enabled = false
# 单用户最大允许设备数
max_devices = 5
# 单用户最大同时播放流数
max_streams = 2
# 超出限制时是否踢掉最早会话
kick_oldest_session = false

# ===================================================================
[Webhook]
# ===================================================================
# 是否启用 Webhook（接收 Emby 播放事件）
webhook_enabled = false
# Webhook 验证密钥（用于验证来自 Emby 的请求，建议设置随机字符串）
webhook_secret = ""
# 外部推送端点（将事件转发到这些 URL）
webhook_endpoints = []
# 是否记录播放统计
playback_stats_enabled = true
# 是否启用排行榜功能
ranking_enabled = true
# 排行榜是否公开（不需要登录即可查看）
ranking_public = false

# ===================================================================
[API]
# ===================================================================
# 监听地址（0.0.0.0 = 所有网卡）
host = "0.0.0.0"
# 监听端口
port = 5000
# 调试模式（生产环境必须为 false）
debug = false
# JWT Token 过期时间（秒，默认 10 天）
token_expire = 864000
# API Key 长度
api_key_length = 32
# 是否启用 CORS 跨域
cors_enabled = true
# 允许的跨域来源（空 = 允许所有，生产环境建议限制为前端域名）
# 示例: ["https://your-domain.com"]
cors_origins = []
# 文件上传目录（相对于项目根目录或绝对路径）
# upload_folder = "uploads"
# 最大上传文件大小（字节，默认 5MB）
# max_upload_size = 5242880

# ===================================================================
[Security]
# ===================================================================
# 是否启用同一用户 IP 数量限制
ip_limit_enabled = false
# 每用户 30 天内允许的最大 IP 数量
max_ips_per_user = 10
# 连续登录失败多少次后锁定
login_fail_threshold = 5
# 锁定时长（分钟）
lockout_minutes = 30
# 是否记录所有登录日志
log_all_logins = true

# ===================================================================
[Scheduler]
# ===================================================================
# 时区
timezone = "Asia/Shanghai"
# 是否启用定时任务
enabled = true
# 过期用户清理时间（HH:MM）
expired_check_time = "03:00"
# 即将过期提醒时间
expiring_check_time = "09:00"
# 自动续期检查时间
auto_renew_time = "02:00"
# 每日统计生成时间
daily_stats_time = "00:05"
# 会话清理间隔（小时）
session_cleanup_interval = 6
# Emby 用户同步间隔（小时）
emby_sync_interval = 6

# ===================================================================
[Notification]
# ===================================================================
# 是否启用通知服务
enabled = true
# 到期前几天发送提醒
expiry_remind_days = 3
# 每日排行榜推送时间（HH:MM，留空 = 不推送）
daily_ranking_time = ""
# 新媒体入库是否通知
new_media_notify = false

# ===================================================================
[BangumiSync]
# ===================================================================
# 是否启用 Bangumi 同步（Emby 看完自动在 BGM 标记进度）
enabled = false
# 同步时自动添加到收藏（标记为"在看"）
auto_add_collection = true
# 观看记录设为私密
private_collection = true
# 屏蔽关键词（包含这些词的番剧不同步）
block_keywords = []
# 最低播放进度百分比（达到才算看完）
min_progress_percent = 80
